name: 每天早上9點有巢氏大甲店自動發文

on:
  schedule:
    # 這是 Cron 語法。GitHub 伺服器使用的是 UTC 時間（比台灣慢 8 小時）。
    # 台灣時間早上 9 點 = UTC 時間凌晨 1 點。
    # 語法：分 小時 日 月 星期 (星星 * 代表每天/每個月)
    - cron: '0 1 * * *'
  workflow_dispatch: # 保留這個，讓你隨時可以手動按按鈕測試

jobs:
  run-auto-post:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下載程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安裝必備套件
        run: |
          pip install requests pytz google-generativeai
          
      - name: 🚀 執行發文腳本
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python auto_post.py
